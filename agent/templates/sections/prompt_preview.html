<div class="prompt-preview-container mt-4 p-4 bg-gray-50 dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-800">
    <div class="flex items-center justify-between mb-3">
        <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400">
            Prompt Preview Engine
        </label>
        <select class="prompt-preset-select text-xs bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-700 rounded shadow-sm focus:ring-primary-500 focus:border-primary-500 py-1" 
                data-url="prompt-preview/{{ instance.pk }}/">
            <option value="">-- Standard Prompt --</option>
            {% for preset in presets %}
                <option value="{{ preset.value }}">{{ preset.label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="prompt-preview-content font-mono text-[11px] whitespace-pre-wrap leading-relaxed text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 p-4 rounded border border-gray-100 dark:border-gray-700 min-h-[100px] max-h-[400px] overflow-y-auto">Select a preset to visualize the data sent to the AI agent...</div>
</div>
