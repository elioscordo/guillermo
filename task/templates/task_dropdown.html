
{%if tasks%}
<el-dropdown id="task-{{instance.id}}" class="inline-block" data-status="{{tasks.0.status}}" data-instance-id="{{instance.id}}">
  <button class="cursor-pointer inline-flex w-full justify-center gap-x-1.5 rounded-md bg-{{tasks.0.color}}-300 text-white px-3 py-2 text-sm font-semibold  inset-ring-1 inset-ring-{{tasks.0.color}}">
    {{tasks.0.status_label}}
  </button>

  <el-menu anchor="bottom end" popover class="w-56 origin-top-right rounded-md bg-gray-800 outline-1 -outline-offset-1 outline-white/10 transition transition-discrete [--anchor-gap:--spacing(2)] data-closed:scale-95 data-closed:transform data-closed:opacity-0 data-enter:duration-100 data-enter:ease-out data-leave:duration-75 data-leave:ease-in">
    <div class="py-1">
       {%for task in tasks %}
          <a  href="/admin/task/task/?id__exact={{ task.id }}" class="block px-4 py-2 text-sm text-gray-300 focus:bg-{{ task.color }}-300 focus:text-white focus:outline-hidden">{{ task.type_label }} ({{task.status_label}}) </a>
       {% endfor %}
    </div>
  </el-menu>
</el-dropdown>
{%else%}
<el-dropdown id="task-{{instance.id}}" class="inline-block" data-status="-1" data-instance-id="{{instance.id}}">
  <button class="cursor-pointer inline-flex w-full justify-center gap-x-1.5 rounded-md bg-primary-400 text-white px-3 py-2 text-sm font-semibold  inset-ring-1 inset-ring-primary-400">
    No tasks
  </button>
  {% endif %}
