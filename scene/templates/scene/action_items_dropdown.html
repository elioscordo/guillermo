{% load i18n %}
<el-dropdown class="inline-block">
    <button class="cursor-pointer inline-flex items-center gap-1.5 rounded-md bg-base-100 dark:bg-base-800 border border-base-200 dark:border-base-700 px-2.5 py-1.5 text-xs font-semibold text-font-secondary-light dark:text-font-secondary-dark shadow-sm hover:bg-base-200 dark:hover:bg-base-700 transition-colors">
        <span class="material-symbols-outlined text-[18px]">more_vert</span>
        {% if instance.model_name == 'voiceaction' %}
            {% trans "Voice" %}
        {% elif instance.model_name == 'videoaction' %}
            {% trans "Video" %}
        {% elif instance.model_name == 'comicaction' %}
            {% trans "Comic" %}
        {% else %}
            {% trans "Image" %}
        {% endif %}
    </button>

    <el-menu anchor="bottom start" popover class="w-48 origin-top-left rounded-lg bg-white dark:bg-base-800 shadow-xl border border-base-200 dark:border-base-700 p-1.5 transition transition-discrete data-closed:scale-95 data-closed:opacity-0">
        <div class="flex flex-col gap-0.5">
            <a href="{% url 'admin:scene_scene_changelist' %}?id__exact={{ instance.scene.id }}" class="flex items-center justify-between px-3 py-1.5 text-[11px] hover:bg-base-100 dark:hover:bg-white/[.05] transition-colors rounded-md text-font-secondary-light dark:text-white hover:text-primary-600 dark:hover:text-primary-400 group/item border-b border-base-100 dark:border-base-800 mb-0.5 pb-2">
                <span class="font-bold text-primary-600 dark:text-primary-400">{{ instance.scene.name }}</span>
                <span class="flex items-center justify-center font-bold text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-950/30 px-1.5 py-0.5 rounded">
                    <span class="material-symbols-outlined text-[16px]">arrow_upward</span>
                </span>
            </a>

            <a href="{% url 'admin:scene_action_changelist' %}?id__exact={{ instance.id }}" class="flex items-center justify-between px-3 py-1.5 text-[11px] hover:bg-base-100 dark:hover:bg-white/[.05] transition-colors rounded-md text-font-secondary-light dark:text-white hover:text-primary-600 dark:hover:text-primary-400 group/item">
                <span>{% trans "Image Shot" %}</span>
                <span class="flex items-center justify-center font-bold text-font-important-light dark:text-font-important-dark bg-base-100 dark:bg-base-800 px-1.5 py-0.5 rounded">
                    <span class="material-symbols-outlined text-[16px]">image</span>
                </span>
            </a>

            <a href="{% url 'admin:scene_comicaction_changelist' %}?id__exact={{ instance.id }}" class="flex items-center justify-between px-3 py-1.5 text-[11px] hover:bg-base-100 dark:hover:bg-white/[.05] transition-colors rounded-md text-font-secondary-light dark:text-white hover:text-primary-600 dark:hover:text-primary-400 group/item">
                <span>{% trans "Comic Shot" %}</span>
                <span class="flex items-center justify-center font-bold text-font-important-light dark:text-font-important-dark bg-base-100 dark:bg-base-800 px-1.5 py-0.5 rounded">
                    <span class="material-symbols-outlined text-[16px]">auto_awesome</span>
                </span>
            </a>

            <a href="{% url 'admin:scene_videoaction_changelist' %}?id__exact={{ instance.id }}" class="flex items-center justify-between px-3 py-1.5 text-[11px] hover:bg-base-100 dark:hover:bg-white/[.05] transition-colors rounded-md text-font-secondary-light dark:text-white hover:text-primary-600 dark:hover:text-primary-400 group/item">
                <span>{% trans "Video Shot" %}</span>
                <span class="flex items-center justify-center font-bold text-font-important-light dark:text-font-important-dark bg-base-100 dark:bg-base-800 px-1.5 py-0.5 rounded">
                    <span class="material-symbols-outlined text-[16px]">videocam</span>
                </span>
            </a>

            <a href="{% url 'admin:scene_voiceaction_changelist' %}?id__exact={{ instance.id }}" class="flex items-center justify-between px-3 py-1.5 text-[11px] hover:bg-base-100 dark:hover:bg-white/[.05] transition-colors rounded-md text-font-secondary-light dark:text-white hover:text-primary-600 dark:hover:text-primary-400 group/item">
                <span>{% trans "Voice Shot" %}</span>
                <span class="flex items-center justify-center font-bold text-font-important-light dark:text-font-important-dark bg-base-100 dark:bg-base-800 px-1.5 py-0.5 rounded">
                    <span class="material-symbols-outlined text-[16px]">mic</span>
                </span>O
            </a>
        </div>
    </el-menu>
</el-dropdown>
