{% load i18n %}
<div class="flex flex-col {% if card_included == 1 %}-m-6{% else %}bg-white lg:border lg:border-base-200 lg:rounded-default lg:shadow-xs lg:dark:border-base-800 dark:bg-base-900 overflow-hidden mb-6{% endif %}">
    <div class="px-4 py-3 border-b border-base-200 dark:border-base-800 flex justify-between items-center bg-base-50/50 dark:bg-white/[.01]">
        <h2 class="font-semibold text-font-important-light text-sm dark:text-font-important-dark">
            {{ title }}
        </h2>

        <button type="button" 
                onclick="refreshSection('{{ instance.id }}', '{{ section_key }}')"
                class="cursor-pointer inline-flex items-center gap-1.5 px-2 py-1 text-[10px] font-bold uppercase tracking-wider text-primary-600 hover:text-primary-500 dark:text-primary-400 transition-colors group">
            <span class="material-symbols-outlined text-[16px] group-hover:rotate-180 transition-transform duration-500">refresh</span>
            {% trans "Refresh" %}
        </button>
    </div>

    <div class="p-4 sm:p-6" id="section-content-{{ section_key }}-{{ instance.id }}">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            {% include "sections/scene_cards_items.html" %}
        </div>
    </div>
</div>
