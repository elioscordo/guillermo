<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }
        .header {
            padding: 32px 32px 16px;
            text-align: center;
        }
        .brand {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
        }
        .content {
            padding: 0 32px 48px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 8px;
            margin-bottom: 16px;
            color: #111827;
            letter-spacing: -0.025em;
        }
        .text-secondary {
            color: #4b5563;
            margin-bottom: 32px;
            font-size: 16px;
        }
        .cta-button {
            display: inline-block;
            background-color: #111827;
            color: #ffffff !important;
            padding: 14px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: background-color 0.2s;
        }
        .footer {
            padding: 24px 32px;
            background-color: #f9fafb;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #9ca3af;
        }
        .session-card {
            border: 1px solid #f3f4f6;
            background-color: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 32px;
            font-weight: 500;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">Guillermo. </div>
        </div>
        <div class="content">
            <h1>You've been invited</h1>
            <p class="text-secondary">You are invited to join a new collaborative script.</p>
            
            <div class="session-card">
                {{ obj.get_name }}
            </div>

            <a href="{{ cta_url }}" class="cta-button">Contribute to the script</a>
        </div>
        <div class="footer">
            This invitation was sent to you because a friend invited you.
        </div>
    </div>
</body>
</html>
