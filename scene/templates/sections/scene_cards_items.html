{% load i18n %}
{% for item in items %}
    <div class="group flex flex-col rounded-xl border border-base-200 dark:border-base-800 bg-white dark:bg-base-800 hover:shadow-xl transition-all duration-300 gallery-card-wrapper" data-id="{{ item.id }}">
        <div class="relative w-full aspect-square flex items-center justify-center bg-base-50/50 dark:bg-base-900/40 rounded-t-xl p-4">
            <div class="transition-transform duration-500 group-hover:scale-105">
                {{ item.pic }}
            </div>
        </div>

        <div class="p-4 min-w-0">
            <div class="flex justify-between items-start gap-2 mb-1">
                <p class="text-sm font-bold text-font-important-light dark:text-font-important-dark truncate" title="{{ item.name }}">
                    {{ item.name }}
                </p>
                <a href="{% url 'admin:scene_'|add:item.model_name|add:'_changelist' %}?id__exact={{ item.id }}" class="text-primary-600 hover:text-primary-500 dark:text-primary-400 text-[10px] font-bold uppercase tracking-wider">
                    {% trans "Edit" %}
                </a>
            </div>
            {% if item.prompt %}
                <p class="text-[11px] leading-relaxed text-font-secondary-light dark:text-font-secondary-dark line-clamp-2 opacity-80 italic">
                    {{ item.prompt }}
                </p>
            {% endif %}
        </div>
    </div>
{% empty %}
    <p class="text-xs text-font-secondary-light dark:text-font-secondary-dark italic col-span-full py-8 text-center">{% trans "No items found." %}</p>
{% endfor %}
