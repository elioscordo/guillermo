<!-- templates/admin/signup.html -->
{% extends 'unfold/layouts/base_simple.html' %}
{% load i18n unfold %}

{% block content %}
  <div class="max-w-md mx-auto mt-8">
    <form method="post">
      {% csrf_token %}
      {% component "unfold/components/card.html" %}
        {% component "unfold/components/title.html" %}{% trans "Sign Up" %}{% endcomponent %}
        
        <div class="mt-4 space-y-4">
          {{ form.as_p }}
        </div>

        <div class="mt-6">
          <button type="submit" class="bg-primary-600 text-white px-4 py-2 rounded">
            {% trans "Register" %}
          </button>
        </div>
      {% endcomponent %}
    </form>
  </div>
{% endblock %}
